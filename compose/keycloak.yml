# Keycloak — identity provider for VerdeMart.
# Dev mode (H2 backing store) — for the checkpoint demo only.
services:
    keycloak:
        image: quay.io/keycloak/keycloak:25.0
        container_name: verdemart_keycloak
        command: ["start-dev"]
        ports:
            - "8083:8080"
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: admin
            KC_BOOTSTRAP_ADMIN_PASSWORD: admin
            KC_HEALTH_ENABLED: "true"
        networks:
            - verdemart

networks:
    verdemart:
        external: true
